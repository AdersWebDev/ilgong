<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>건물 추가</title>
    <link rel="stylesheet" href="/main/style.css">
    <link rel="stylesheet" href="/aders/dashboard/building/static/building.css">
    <link rel="stylesheet" href="/aders/dashboard/building/static/add.css">
    <link rel="icon" href="../../../assest/favicon.png" type="image/png" />
</head>

<body>
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">건물 추가</h1>
            <a class="back-link" href="/aders/dashboard/building">← 목록으로</a>
        </div>

        <form id="addBuildingForm" class="add-building-form">
            <div class="detail-form-grid">
                <section class="detail-section detail-section-basic">
                    <h2 class="detail-section-title">기본 정보</h2>
                    <div class="form-group">
                        <label class="form-label" for="buildingName">건물명 <span class="required">*</span></label>
                        <input type="text" id="buildingName" name="buildingName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="address">주소 <span class="required">*</span></label>
                        <input type="text" id="address" name="address" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="prefCode">도도부현 <span class="required">*</span></label>
                        <input type="text" id="prefCode" name="prefCode" class="form-input" required placeholder="자동완성 예정">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="cityCode">시구군 <span class="required">*</span></label>
                        <input type="text" id="cityCode" name="cityCode" class="form-input" required placeholder="자동완성 예정">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="constructionDate">건축일 <span class="required">*</span></label>
                        <input type="date" id="constructionDate" name="constructionDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="structure">구조 <span class="required">*</span></label>
                        <select id="structure" name="structure" class="form-input" required>
                            <option value="">선택</option>
                            <option value="CONCRETE">철근·콘크리트 계열</option>
                            <option value="STEEL">철골 계열</option>
                            <option value="OTHER">기타 계열(목조 등)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lat">위도 <span class="required">*</span></label>
                        <input type="number" id="lat" name="lat" class="form-input" step="any" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lng">경도 <span class="required">*</span></label>
                        <input type="number" id="lng" name="lng" class="form-input" step="any" required>
                    </div>
                    <div class="form-group col">
                        <label class="form-label">대표 사진</label>
                        <button type="button" class="list-photo-card" id="listPhotoCard" title="대표 사진 업로드">
                            <div class="list-photo-card-inner">
                                <div class="list-photo-card-title">대표 사진</div>
                                <div class="list-photo-card-preview" id="listPhotoPreview"></div>
                                <div class="list-photo-card-hint">이미지 첨부</div>
                            </div>
                        </button>
                        <input type="file" id="listPhotoInput" accept=".jpg,.jpeg,.png,image/jpeg,image/png" title="대표 사진 업로드" class="list-photo-input">
                        <input type="hidden" id="listPhoto" name="photo" value="">
                    </div>
                </section>

                <section class="detail-section detail-section-facilities">
                    <h2 class="detail-section-title">기본 분류</h2>
                    <div class="classification-buttons" id="buildingClassification" role="group" aria-label="기본 분류">
                        <button type="button" class="classify-btn" data-key="allowForeigner" aria-pressed="false">외국인 가능</button>
                        <button type="button" class="classify-btn" data-key="allowWorkingHoliday" aria-pressed="false">워킹홀리데이 가능</button>
                    </div>
                    <div class="detail-subtitle">건물 설비</div>
                    <div class="facility-grid" id="buildingFacilities"></div>
                </section>

                <section class="detail-section detail-section-transit">
                    <h2 class="detail-section-title">교통 정보</h2>
                    <div class="form-group">
                        <label class="form-label" for="trans1">교통 1</label>
                        <input type="text" id="trans1" name="trans1" class="form-input" placeholder="예: 千日前線「阿波座」徒歩8分">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="trans2">교통 2</label>
                        <input type="text" id="trans2" name="trans2" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="trans3">교통 3</label>
                        <input type="text" id="trans3" name="trans3" class="form-input">
                    </div>
                </section>

                <section class="detail-section detail-section-photos">
                    <h2 class="detail-section-title">건물 사진</h2>
                    <div class="ilgong-photo-list-wrap photo-drop-zone" aria-label="사진을 끌어다 놓거나 클릭하여 추가">
                        <div class="photo-list" id="ilgongPhotoList"></div>
                        <div class="photo-add" id="ilgongPhotoAdd" title="사진 추가">
                            <input type="file" id="ilgongPhotoInput" accept=".jpg,.jpeg,.png,image/jpeg,image/png" multiple>
                            + 추가
                        </div>
                    </div>
                    <p class="form-hint">저장 후 상세 페이지에서 추가·순서 변경 가능합니다.</p>
                </section>

                <section class="detail-section detail-section-rooms">
                    <h2 class="detail-section-title">호실</h2>
                    <div id="addRoomError" class="form-error" style="display: none;"></div>
                    <div class="room-blocks" id="roomBlocks"></div>
                    <button type="button" class="btn-secondary" id="addRoomBtn">+ 호실 추가</button>
                </section>
            </div>

            <div class="form-actions">
                <a class="btn-secondary" href="/aders/dashboard/building">취소</a>
                <button type="submit" class="btn-primary" id="addSubmitBtn">등록</button>
            </div>
        </form>
    </div>

    <div id="addUploadOverlay" class="add-upload-overlay" style="display: none;" aria-live="polite">
        <div class="add-upload-overlay-box">
            <p id="addUploadProgressText" class="add-upload-progress-text">파일 업로드 중 0/0</p>
        </div>
    </div>

    <script src="/aders/dashboard/building/static/building-form-utils.js"></script>
    <script src="/aders/dashboard/building/static/building-photo-api.js"></script>
    <script src="/aders/dashboard/building/static/add.js"></script>
</body>

</html>
